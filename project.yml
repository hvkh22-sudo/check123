# XcodeGen project spec — generates PassCheck.xcodeproj (no Mac needed to author this).
# CI runs `xcodegen generate` then builds. Fill DEVELOPMENT_TEAM after Apple enrollment.
name: PassCheck
options:
  bundleIdPrefix: com.appstudio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "645SRC2PTY"   # Apple Team ID (owner's Apple Developer account)
targets:
  PassCheck:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PassCheck
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Portrait-only: the capture/crop flow is designed for one orientation,
        # and iPhone-only avoids untestable iPad multitasking requirements.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "Take your passport photo — it is processed only on this device and never uploaded."
        # Required by the Save Image path in the share sheet. Without it iOS terminates
        # the app the moment the user saves — on the screen they just paid for.
        NSPhotoLibraryAddUsageDescription: "Save your finished passport photo to your photo library. It stays on this device."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appstudio.passcheck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only (MVP scope)
  PassCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: PassCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appstudio.passcheck.tests
