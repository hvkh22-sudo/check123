# XcodeGen project spec — generates PassCheck.xcodeproj (no Mac needed to author this).
# CI runs `xcodegen generate` then builds. Fill DEVELOPMENT_TEAM after Apple enrollment.
name: PassCheck
options:
  bundleIdPrefix: com.appstudio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    # Must stay above the very first upload's default of 1.0: iOS never offers an
    # "update" to a lower version, so builds published under 0.1.0 were invisible to
    # a device already running 1.0 (1) — which looked like the uploads were failing.
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "645SRC2PTY"   # Apple Team ID (owner's Apple Developer account)
targets:
  PassCheck:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PassCheck
        # Without these, XcodeGen bakes a literal "1" into the Info.plist and the build
        # settings are ignored — which is why three uploads were rejected for reusing
        # build number 1. Referencing the settings lets CI override the build number.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Portrait-only: the capture/crop flow is designed for one orientation,
        # and iPhone-only avoids untestable iPad multitasking requirements.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "Take your passport photo — it is processed only on this device and never uploaded."
        # Required by the Save Image path in the share sheet. Without it iOS terminates
        # the app the moment the user saves — on the screen they just paid for.
        NSPhotoLibraryAddUsageDescription: "Save your finished passport photo to your photo library. It stays on this device."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appstudio.passcheck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only (MVP scope)
  PassCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: PassCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appstudio.passcheck.tests
