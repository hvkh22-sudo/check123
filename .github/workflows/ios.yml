name: iOS CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: |
          xcodegen generate
          xcodebuild -version
          ls -d *.xcodeproj
      - name: Build & unit test (no signing)
        run: |
          set +e
          UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE "[0-9A-Fa-f-]{36}" | head -1)
          echo "Using simulator id: $UDID"
          xcodebuild test \
            -project PassCheck.xcodeproj \
            -scheme PassCheck \
            -destination "platform=iOS Simulator,id=$UDID" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "----- surfacing errors as annotations -----"
            grep -E "error:|cannot find|Undefined symbol|no such module|is unavailable|Unable to find a destination" build.log | head -50 | sed 's/^/::error::/'
            tail -25 build.log | sed 's/^/::error::/'
            exit "$code"
          fi
# TestFlight upload is a separate, manual (workflow_dispatch) job added later once
# signing secrets exist — see ../../CI_SETUP.md. The studio never auto-ships.
