name: iOS CI
on:
  push:
    branches: [ main ]
    # Owner authorised this on 2026-07-21 so the upload can be iterated without a manual
    # click on every attempt. Only a deliberate ship-* tag ships; ordinary commits never do.
    # Revert to workflow_dispatch-only once the pipeline is green.
    tags: [ 'ship-*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: |
          xcodegen generate
          xcodebuild -version
          ls -d *.xcodeproj
      - name: Build & unit test (no signing)
        run: |
          set +e
          UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE "[0-9A-Fa-f-]{36}" | head -1)
          echo "Using simulator id: $UDID"
          xcodebuild test \
            -project PassCheck.xcodeproj \
            -scheme PassCheck \
            -destination "platform=iOS Simulator,id=$UDID" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "----- surfacing errors as annotations -----"
            grep -E "error:|cannot find|Undefined symbol|no such module|is unavailable|Unable to find a destination" build.log | head -50 | sed 's/^/::error::/'
            tail -25 build.log | sed 's/^/::error::/'
            exit "$code"
          fi
  # Manual-only (workflow_dispatch) TestFlight upload. Never auto-ships.
  ship-testflight:
    needs: build-test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/ship-')
    runs-on: macos-26
    permissions:
      contents: write   # only to publish the failure log to the ci-logs branch
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          brew install xcodegen
          gem install fastlane --no-document
      - name: Generate Xcode project
        run: xcodegen generate   # build number is set by the Fastfile, not edited in here
      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -uo pipefail
          xcodebuild -version
          # The key must not survive the step. fl.log must, so the next step can publish
          # the failure — annotations proved unreliable for anything log-sized.
          trap 'rm -f asc_key.p8' EXIT
          for secret_name in ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Required secret ${secret_name} is empty or missing."
              exit 1
            fi
          done
          # Accept either base64 or raw PEM in the secret.
          printf '%s' "$ASC_KEY_P8" | tr -d '\r\n ' | base64 --decode > asc_key.p8 2>/dev/null
          if ! grep -q "BEGIN PRIVATE KEY" asc_key.p8; then
            printf '%s\n' "$ASC_KEY_P8" > asc_key.p8
          fi
          if ! grep -q "BEGIN PRIVATE KEY" asc_key.p8; then
            echo "::error::ASC_KEY_P8 is neither valid base64 of a .p8 nor a raw .p8 PEM. Re-add the secret."
            exit 1
          fi
          if ! openssl pkey -in asc_key.p8 -noout; then
            echo "::error::ASC_KEY_P8 contains a PEM header but the private key does not parse."
            exit 1
          fi
          echo "Private key parses OK."
          export ASC_KEY_PATH="$PWD/asc_key.p8"
          fastlane beta 2>&1 | tee fl.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "----- surfacing errors -----"
            # One multi-line annotation with the log tail — GitHub caps the number of
            # annotations, so many small ones push the real error out of view.
            # Keep this small: GitHub silently drops annotations that get too large,
            # which is how the real error went missing on runs 42 and 44.
            TAILTXT=$(grep -E "^\[!\]|error:|Validation failed|ERROR ITMS" fl.log | tail -6 | sed -e 's/\x1b\[[0-9;]*m//g' -e 's/%/%25/g' | cut -c1-300 | awk '{printf "%s%%0A", $0}')
            [ -z "$TAILTXT" ] && TAILTXT=$(tail -8 fl.log | sed -e 's/\x1b\[[0-9;]*m//g' -e 's/%/%25/g' | cut -c1-300 | awk '{printf "%s%%0A", $0}')
            echo "::error::LOG TAIL%0A${TAILTXT}"
            exit "$code"
          fi
      # GitHub drops oversized annotations, and the raw logs need authentication to read.
      # Publishing a sanitised excerpt to a dedicated branch makes failures self-reporting.
      - name: Publish failure log
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          {
            echo "run:        ${GITHUB_RUN_NUMBER}"
            echo "commit:     ${GITHUB_SHA}"
            echo "=== matched error lines ==="
            grep -aE '^\[!\]|error:|Validation failed|ERROR ITMS|Could not|failed' fl.log | tail -25
            echo "=== last 40 lines ==="
            tail -40 fl.log
          } 2>/dev/null \
            | sed -e 's/\x1b\[[0-9;]*m//g' \
            | grep -av 'PRIVATE KEY' \
            | grep -avE '[A-Za-z0-9+/]{100,}' \
            > ci-error.txt
          echo "--- published excerpt ---"
          cat ci-error.txt
          # Publish from a throwaway repo: the checkout is dirty (generated project,
          # rewritten build number), and git refuses to switch branches over that.
          OUT=$(mktemp -d)
          cp ci-error.txt "$OUT/"
          cd "$OUT"
          git init -q
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -q -b ci-logs
          git add ci-error.txt
          git commit -q -m "CI failure log for run ${GITHUB_RUN_NUMBER}"
          git push -f -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs
          echo "published to branch ci-logs"
